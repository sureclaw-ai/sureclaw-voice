<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101418" />
    <title>__APP_FULL_NAME__ — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #101418;
        color: #e6edf3;
        font:
          16px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0;
      }
      p {
        margin: 0;
        opacity: 0.7;
        max-width: 320px;
      }
      button {
        margin-top: 8px;
        padding: 10px 18px;
        border: 1px solid #2a313c;
        border-radius: 10px;
        background: #1b2129;
        color: #e6edf3;
        font: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #232b36;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>__APP_FULL_NAME__ needs a network connection to place a call.</p>
      <button onclick="location.reload()">Reconnect</button>
    </main>
  </body>
</html>
